<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cars 3 Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a14;color:#e0e0e0;height:100vh;overflow:hidden;display:flex}
#sidebar{width:300px;background:#12141f;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:10px 16px;border-bottom:1px solid #2a2d3e;display:flex;gap:4px}
#sidebar-header button{flex:1;padding:6px 8px;border:1px solid #2a2d3e;background:#1a1c2e;color:#aabbdd;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600}
#sidebar-header button:hover{background:#2a2d4e;color:#fff}
#sidebar-header button.active{background:#1a2050;color:#7799ee;border-color:#4466aa}
#sidebar-content{flex:1;overflow-y:auto}
.sidebar-section{padding:4px 0}
.sidebar-section h2{padding:8px 16px;font-size:12px;color:#7788cc;border-bottom:1px solid #1a1c28}
.btn{display:block;width:100%;text-align:left;padding:7px 16px;border:none;background:none;color:#c0c0d0;font-size:12px;cursor:pointer;border-bottom:1px solid #1a1c28;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.btn:hover{background:#1a1c30;color:#fff}
.btn.active{background:#1a2040;color:#7799ee}
.btn .ext{color:#667;font-size:10px;margin-left:4px}
.btn .size{color:#556;font-size:10px;float:right}
.dir-btn{color:#88aacc}
.dir-btn::before{content:'\\25B6 ';font-size:9px;color:#556}
.breadcrumb{padding:6px 12px;font-size:11px;color:#778;border-bottom:1px solid #1a1c28;background:#0e1018}
.breadcrumb a{color:#6688bb;text-decoration:none;cursor:pointer}
.breadcrumb a:hover{color:#99bbff}
.search-box{padding:8px;border-bottom:1px solid #1a1c28}
.search-box input{width:100%;padding:6px 10px;border:1px solid #2a2d3e;background:#0e1018;color:#c0c0d0;border-radius:3px;font-size:12px}
.search-box input:focus{outline:none;border-color:#4466aa}
#viewport{flex:1;position:relative;background:#0d0d1a;display:flex;flex-direction:column}
#viewer-area{flex:1;position:relative}
#viewer-area.hidden{display:none}
#file-area{flex:1;overflow:auto;padding:16px;display:none;background:#0e1018}
#file-area.active{display:block}
#file-header{padding:8px 16px;background:#12141f;border-bottom:1px solid #2a2d3e;font-size:12px;display:flex;align-items:center;gap:8px}
#file-header .fname{color:#7799cc;font-weight:600}
#file-header .fsize{color:#667}
#file-content{padding:16px;font-size:12px;white-space:pre-wrap;word-break:break-all;font-family:'SF Mono',Consolas,monospace;line-height:1.5;color:#c0c0d0}
#file-content img{max-width:100%;border-radius:4px}
#file-content audio{width:100%;margin-top:8px}
.file-note{color:#cc8844;margin:8px 0;font-style:italic}
#info{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,0.75);padding:8px 12px;border-radius:4px;font-size:11px;color:#8899aa;pointer-events:none;z-index:5}
#toolbar{position:absolute;top:0;left:0;right:0;z-index:5;background:rgba(18,20,31,0.92);padding:8px 12px;display:flex;gap:8px;align-items:center}
#toolbar button{padding:4px 10px;border:1px solid #3a3d5e;background:#1a1c2e;color:#aabbdd;border-radius:3px;cursor:pointer;font-size:11px}
#toolbar button:hover{background:#2a2d4e;color:#fff}
#toolbar .title{font-size:13px;font-weight:600;color:#7799cc}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#667}
.tex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:8px}
.tex-grid canvas{width:100%;border-radius:3px;border:1px solid #2a2d3e;cursor:pointer}
.tex-grid canvas:hover{border-color:#4466aa}
.tex-label{font-size:9px;color:#667;text-align:center;overflow:hidden;text-overflow:ellipsis}
.zip-table{width:100%;border-collapse:collapse}
.zip-table td{padding:4px 8px;border-bottom:1px solid #1a1c28;font-size:11px}
.zip-table tr:hover{background:#1a1c30}
.zip-table .zname{color:#88aacc;cursor:pointer}
.zip-table .zname:hover{color:#aaccff}
.zip-table .zsize{color:#667;text-align:right}
.hex-dump{font-family:'SF Mono',Consolas,monospace;font-size:10px;line-height:1.4;color:#889;word-break:break-all;background:#0a0a14;padding:12px;border-radius:4px;border:1px solid #1a1c28}
.model-section h2{padding:8px 16px;font-size:12px;color:#7788cc;border-bottom:1px solid #1a1c28;background:#12141f;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
.model-section h2:hover{color:#99aadd}
.model-section.collapsed .model-section-items{display:none}
.model-section-items{max-height:40vh;overflow-y:auto}
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header">
    <button class="active" onclick="showTab('models')" id="tab-models">Models</button>
    <button onclick="showTab('files')" id="tab-files">Romfs</button>
    <button onclick="showTab('search')" id="tab-search">Search</button>
  </div>
  <div id="sidebar-content">
    <div id="panel-models">
      <div id="model-sections"></div>
    </div>
    <div id="panel-files" style="display:none">
      <div id="breadcrumb" class="breadcrumb"><a onclick="browseRomfs('')">romfs</a></div>
      <div id="fileList"></div>
    </div>
    <div id="panel-search" style="display:none">
      <div class="search-box"><input id="searchInput" placeholder="Search romfs files..." onkeydown="if(event.key==='Enter')doSearch()"></div>
      <div id="searchResults"></div>
    </div>
  </div>
</div>
<div id="viewport">
  <div id="viewer-area">
    <div id="toolbar">
      <span class="title" id="modelName">Select a character</span>
      <button onclick="toggleWireframe()">Wireframe</button>
      <button onclick="toggleSpin()">Spin</button>
      <button onclick="resetCamera()">Reset</button>
    </div>
    <div id="loading"></div>
    <div id="info"></div>
  </div>
  <div id="file-area">
    <div id="file-header"></div>
    <div id="file-content"></div>
  </div>
</div>

<script src="three.min.js"></script>
<script src="bc7_decoder.js"></script>
<script>
// ── State ──
let scene, camera, renderer, modelGroup;
let isSpinning = false, isWireframe = false;
let theta = 0, phi = Math.PI/4, radius = 5;
let targetX = 0, targetY = 0, targetZ = 0;
let mouseDown = false, prevMX = 0, prevMY = 0;
let currentTab = 'models';
let currentPath = '';

// ── Three.js init ──
function initViewport() {
  const el = document.getElementById('viewer-area');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d1a);
  camera = new THREE.PerspectiveCamera(40, el.clientWidth/el.clientHeight, 0.01, 200);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(el.clientWidth, el.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  el.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x8899bb, 0.5));
  const dl = new THREE.DirectionalLight(0xffffff, 1.0);
  dl.position.set(5,10,7); dl.castShadow = true; scene.add(dl);
  scene.add(new THREE.DirectionalLight(0x88bbff,0.3).translateX(-5).translateZ(-5));
  scene.add(new THREE.DirectionalLight(0x6688aa,0.2).translateX(-3).translateY(1).translateZ(5));
  scene.add(new THREE.HemisphereLight(0x88bbff, 0x886633, 0.4));
  scene.add(new THREE.GridHelper(8, 16, 0x4488ff, 0x3355aa));

  renderer.domElement.addEventListener('mousedown', e=>{if(e.button===0){mouseDown=true;prevMX=e.clientX;prevMY=e.clientY;}});
  window.addEventListener('mousemove', e=>{
    if(!mouseDown)return;
    theta-=(e.clientX-prevMX)*0.01;
    phi=Math.max(0.1,Math.min(Math.PI-0.1,phi+(e.clientY-prevMY)*0.01));
    prevMX=e.clientX;prevMY=e.clientY;updateCamera();
  });
  window.addEventListener('mouseup',()=>mouseDown=false);
  renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();radius=Math.max(0.5,Math.min(50,radius+e.deltaY*0.005));updateCamera();},{passive:false});
  updateCamera();
  animate();
}

function updateCamera(){
  camera.position.x=targetX+radius*Math.sin(phi)*Math.sin(theta);
  camera.position.y=targetY+radius*Math.cos(phi);
  camera.position.z=targetZ+radius*Math.sin(phi)*Math.cos(theta);
  camera.lookAt(targetX,targetY,targetZ);
}

function animate(){
  requestAnimationFrame(animate);
  if(isSpinning&&modelGroup) modelGroup.rotation.y+=0.008;
  renderer.render(scene,camera);
}

// ── Sidebar tabs ──
function showTab(tab){
  currentTab = tab;
  document.querySelectorAll('#sidebar-header button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-models').style.display = tab==='models'?'':'none';
  document.getElementById('panel-files').style.display = tab==='files'?'':'none';
  document.getElementById('panel-search').style.display = tab==='search'?'':'none';
  if(tab==='files' && !currentPath) browseRomfs('');
}

// ── Romfs browser ──
async function browseRomfs(path){
  currentPath = path;
  const el = document.getElementById('fileList');
  el.innerHTML = '<div style="padding:12px;color:#556">Loading...</div>';
  const bc = document.getElementById('breadcrumb');
  const parts = path ? path.split('/') : [];
  let html = '<a onclick="browseRomfs(\'\')">romfs</a>';
  let cumul = '';
  for(const p of parts){
    cumul += (cumul?'/':'')+p;
    const pp = cumul;
    html += ' / <a onclick="browseRomfs(\''+pp+'\')">'+p+'</a>';
  }
  bc.innerHTML = html;
  try{
    const r = await fetch('/api/browse?path='+encodeURIComponent(path));
    const d = await r.json();
    if(d.error){el.innerHTML='<div style="padding:12px;color:#cc4444">'+d.error+'</div>';return;}
    let h = '';
    const dirs = d.entries.filter(e=>e.type==='dir');
    const files = d.entries.filter(e=>e.type==='file');
    for(const e of dirs){
      h+='<button class="btn dir-btn" onclick="browseRomfs(\''+path+'/'+e.name+'\')">'+e.name+'</button>';
    }
    for(const e of files){
      const sz = e.size>1048576?(e.size/1048576).toFixed(1)+'M':e.size>1024?(e.size/1024).toFixed(0)+'K':e.size+'B';
      const click = getClickHandler(path, e);
      h+='<button class="btn" onclick="'+click+'">'+e.name+'<span class="size">'+sz+'</span></button>';
    }
    if(!dirs.length && !files.length) h='<div style="padding:16px;color:#556">Empty directory</div>';
    el.innerHTML = h;
  }catch(e){el.innerHTML='<div style="padding:12px;color:#cc4444">'+e.message+'</div>';}
}

function getClickHandler(path, entry){
  const full = path ? path+'/'+entry.name : entry.name;
  const ext = entry.ext.toLowerCase();
  if(ext==='.zip') return 'openZip(\''+esc(full)+'\')';
  if(ext==='.tbody'||ext==='.mtb') return 'openFile(\''+esc(full)+'\')';
  if(ext==='.oct') return 'openFile(\''+esc(full)+'\')';
  if(ext==='.wem'||ext==='.bnk'||ext==='.pck') return 'openFile(\''+esc(full)+'\')';
  if(ext==='.bik') return 'openFile(\''+esc(full)+'\')';
  if(ext==='.png'||ext==='.jpg'||ext==='.bmp') return 'openFile(\''+esc(full)+'\')';
  if(ext==='.bin'||ext==='.vbuf'||ext==='.ibuf'||ext==='.bent'||ext==='.bct'||ext==='.banm') return 'openFile(\''+esc(full)+'\')';
  return 'openFile(\''+esc(full)+'\')';
}

function esc(s){return s.replace(/'/g,"\\'");}

async function openFile(path){
  showFileArea();
  document.getElementById('file-header').innerHTML = '<span class="fname">'+path.split('/').pop()+'</span><span class="fsize">Loading...</span>';
  document.getElementById('file-content').innerHTML = '';
  try{
    const r = await fetch('/api/file?path='+encodeURIComponent(path));
    const d = await r.json();
    if(d.error){document.getElementById('file-content').innerHTML='<div class="file-note">'+d.error+'</div>';return;}
    document.getElementById('file-header').innerHTML='<span class="fname">'+d.name+'</span><span class="fsize">'+formatSize(d.size)+' &middot; '+d.ext+'</span>';
    renderFile(d);
  }catch(e){document.getElementById('file-content').innerHTML='<div class="file-note">'+e.message+'</div>';}
}

function renderFile(d){
  const el = document.getElementById('file-content');
  if(d.type==='text'){
    el.textContent = d.content;
  } else if(d.type==='image'){
    el.innerHTML='<img src="data:'+d.mimeType+';base64,'+d.data+'">';
  } else if(d.type==='audio'){
    const playable = d.ext==='.wem';
    if(playable){
      el.innerHTML='<div class="file-note">Wwise audio (may not play in browser)</div><audio controls src="data:'+d.mimeType+';base64,'+d.data+'"></audio>';
    } else {
      el.innerHTML='<div class="file-note">Audio format: '+d.ext+' ('+formatSize(d.size)+')</div><div class="hex-dump">'+d.data.substring(0,500)+'...</div>';
    }
  } else if(d.type==='binary'){
    let html='<div class="file-note">Binary: '+d.ext+' ('+formatSize(d.size)+')</div>';
    if(d.hexPreview) html+='<div class="hex-dump">'+formatHex(d.hexPreview)+'</div>';
    if(d.data) html+='<div style="margin-top:8px"><button onclick="downloadBlob(\''+d.name+'\',\''+d.data+'\')" style="padding:6px 12px;border:1px solid #3a3d5e;background:#1a1c2e;color:#aabbdd;border-radius:3px;cursor:pointer">Download</button></div>';
    el.innerHTML=html;
  } else if(d.type==='zip'){
    let html='<table class="zip-table"><tr><th>Name</th><th style="text-align:right">Size</th><th style="text-align:right">Compressed</th></tr>';
    for(const e of d.entries){
      const ext=e.name.split('.').pop().toLowerCase();
      const click='openZipFile(\''+esc(d.path)+'\',\''+esc(e.name)+'\')';
      html+='<tr><td class="zname" onclick="'+click+'">'+e.name+'</td><td class="zsize">'+formatSize(e.size)+'</td><td class="zsize">'+formatSize(e.compressed)+'</td></tr>';
    }
    html+='</table>';
    el.innerHTML=html;
  } else {
    el.innerHTML='<div class="hex-dump">'+JSON.stringify(d,null,2)+'</div>';
  }
}

async function openZip(path){
  showFileArea();
  document.getElementById('file-header').innerHTML='<span class="fname">'+path.split('/').pop()+'</span><span class="fsize">Loading...</span>';
  document.getElementById('file-content').innerHTML='';
  try{
    const r=await fetch('/api/zip?path='+encodeURIComponent(path));
    const d=await r.json();
    if(d.error){document.getElementById('file-content').innerHTML='<div class="file-note">'+d.error+'</div>';return;}
    renderFile(d);
  }catch(e){document.getElementById('file-content').innerHTML='<div class="file-note">'+e.message+'</div>';}
}

async function openZipFile(zipPath, innerPath){
  showFileArea();
  document.getElementById('file-header').innerHTML='<span class="fname">'+innerPath.split('/').pop()+'</span><span class="fsize">Loading from '+zipPath.split('/').pop()+'...</span>';
  document.getElementById('file-content').innerHTML='';
  try{
    const r=await fetch('/api/zipfile?path='+encodeURIComponent(zipPath)+'&file='+encodeURIComponent(innerPath));
    const d=await r.json();
    if(d.error){document.getElementById('file-content').innerHTML='<div class="file-note">'+d.error+'</div>';return;}
    document.getElementById('file-header').innerHTML='<span class="fname">'+d.name+'</span><span class="fsize">'+formatSize(d.size)+' &middot; '+d.ext+'</span>';
    renderFile(d);
  }catch(e){document.getElementById('file-content').innerHTML='<div class="file-note">'+e.message+'</div>';}
}

function showFileArea(){
  document.getElementById('viewer-area').classList.add('hidden');
  document.getElementById('file-area').classList.add('active');
}
function showViewer(){
  document.getElementById('viewer-area').classList.remove('hidden');
  document.getElementById('file-area').classList.remove('active');
  renderer.setSize(document.getElementById('viewer-area').clientWidth, document.getElementById('viewer-area').clientHeight);
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(q.length<2)return;
  const el=document.getElementById('searchResults');
  el.innerHTML='<div style="padding:12px;color:#556">Searching...</div>';
  try{
    const r=await fetch('/api/search?q='+encodeURIComponent(q));
    const d=await r.json();
    if(d.error){el.innerHTML='<div style="padding:12px;color:#cc4444">'+d.error+'</div>';return;}
    let h='<h2>Results ('+d.results.length+')</h2>';
    for(const e of d.results){
      h+='<button class="btn" onclick="openFile(\''+esc(e.path)+'\')">'+e.name+'<span class="size">'+formatSize(e.size)+'</span></button>';
    }
    if(!d.results.length) h+='<div style="padding:12px;color:#556">No results</div>';
    el.innerHTML=h;
  }catch(e){el.innerHTML='<div style="padding:12px;color:#cc4444">'+e.message+'</div>';}
}

function downloadBlob(name, b64){
  const bin=atob(b64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  const blob=new Blob([arr]);
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}

function formatSize(b){if(b>1048576)return(b/1048576).toFixed(1)+'MB';if(b>1024)return(b/1024).toFixed(0)+'KB';return b+'B';}
function formatHex(hex){let h='';for(let i=0;i<hex.length;i+=2){if(i>0&&i%32===0)h+='\n';h+=hex.substr(i,2)+' ';}return h;}

// ── IEEE 754 float16 ──
function f16(h){
  const s=(h>>15)&1,e=(h>>10)&0x1f,m=h&0x3ff;
  if(e===0)return(s?-1:1)*Math.pow(2,-14)*(m/1024);
  if(e===31)return m===0?(s?-Infinity:Infinity):NaN;
  return(s?-1:1)*Math.pow(2,e-15)*(1+m/1024);
}

// ── BC3/DXT5 texture decoder ──
function rgb565ToRgb(val){return[((val>>11)&0x1f)*8,((val>>5)&0x3f)*4,(val&0x1f)*8];}

function decodeBC3Block(data, off){
  const a0=data[off],a1=data[off+1];
  const ai0=data[off+2]|(data[off+3]<<8)|(data[off+4]<<16);
  const ai1=data[off+5]|(data[off+6]<<8)|(data[off+7]<<16);
  const c0=rgb565ToRgb(data[off+8]|(data[off+9]<<8));
  const c1=rgb565ToRgb(data[off+10]|(data[off+11]<<8));
  const colorIdx=data[off+12]|(data[off+13]<<8)|(data[off+14]<<16)|(data[off+15]<<24);

  const alphaTable=new Uint8Array(8);
  if(a0>a1){
    alphaTable[0]=a0;alphaTable[7]=a1;
    for(let i=1;i<7;i++)alphaTable[i]=((7-i)*a0+i*a1)/7|0;
  }else{
    alphaTable[0]=a0;alphaTable[7]=a1;
    for(let i=1;i<5;i++)alphaTable[i]=((5-i)*a0+i*a1)/5|0;
    alphaTable[5]=0;alphaTable[6]=255;
  }

  const cTable=new Uint8Array(12);
  if((data[off+8]|(data[off+9]<<8))>(data[off+10]|(data[off+11]<<8))){
    cTable[0]=c0[0];cTable[1]=c0[1];cTable[2]=c0[2];
    cTable[3]=(2*c0[0]+c1[0])/3|0;cTable[4]=(2*c0[1]+c1[1])/3|0;cTable[5]=(2*c0[2]+c1[2])/3|0;
    cTable[6]=(c0[0]+2*c1[0])/3|0;cTable[7]=(c0[1]+2*c1[1])/3|0;cTable[8]=(c0[2]+2*c1[2])/3|0;
    cTable[9]=c1[0];cTable[10]=c1[1];cTable[11]=c1[2];
  }else{
    cTable[0]=c0[0];cTable[1]=c0[1];cTable[2]=c0[2];
    cTable[3]=(c0[0]+c1[0])/2|0;cTable[4]=(c0[1]+c1[1])/2|0;cTable[5]=(c0[2]+c1[2])/2|0;
    cTable[6]=c1[0];cTable[7]=c1[1];cTable[8]=c1[2];
    cTable[9]=0;cTable[10]=0;cTable[11]=0;
  }

  const pixels=new Uint8Array(64);
  for(let i=0;i<16;i++){
    const ci=(colorIdx>>(2*i))&3;
    const aiBits=i<8?(ai0>>(3*i))&7:(ai1>>(3*(i-8)))&7;
    pixels[i*4]=cTable[ci*3];pixels[i*4+1]=cTable[ci*3+1];pixels[i*4+2]=cTable[ci*3+2];pixels[i*4+3]=alphaTable[aiBits];
  }
  return pixels;
}

function decodeBC1Block(data, off){
  const c0=rgb565ToRgb(data[off]|(data[off+1]<<8));
  const c1=rgb565ToRgb(data[off+2]|(data[off+3]<<8));
  const colorIdx=data[off+4]|(data[off+5]<<8)|(data[off+6]<<16)|(data[off+7]<<24);
  const cTable=new Uint8Array(12);
  if((data[off]|(data[off+1]<<8))>(data[off+2]|(data[off+3]<<8))){
    cTable[0]=c0[0];cTable[1]=c0[1];cTable[2]=c0[2];
    cTable[3]=(2*c0[0]+c1[0])/3|0;cTable[4]=(2*c0[1]+c1[1])/3|0;cTable[5]=(2*c0[2]+c1[2])/3|0;
    cTable[6]=(c0[0]+2*c1[0])/3|0;cTable[7]=(c0[1]+2*c1[1])/3|0;cTable[8]=(c0[2]+2*c1[2])/3|0;
    cTable[9]=0;cTable[10]=0;cTable[11]=0;
  }else{
    cTable[0]=c0[0];cTable[1]=c0[1];cTable[2]=c0[2];
    cTable[3]=(c0[0]+c1[0])/2|0;cTable[4]=(c0[1]+c1[1])/2|0;cTable[5]=(c0[2]+c1[2])/2|0;
    cTable[6]=c1[0];cTable[7]=c1[1];cTable[8]=c1[2];
    cTable[9]=0;cTable[10]=0;cTable[11]=0;
  }
  const pixels=new Uint8Array(64);
  for(let i=0;i<16;i++){
    const ci=(colorIdx>>(2*i))&3;
    pixels[i*4]=cTable[ci*3];pixels[i*4+1]=cTable[ci*3+1];pixels[i*4+2]=cTable[ci*3+2];pixels[i*4+3]=255;
  }
  return pixels;
}

function decodeBC4Block(data, off){
  const r0=data[off],r1=data[off+1];
  const idx=data[off+2]|(data[off+3]<<8)|(data[off+4]<<16)|(data[off+5]<<24)|(BigInt(data[off+6])<<32n)|(BigInt(data[off+7])<<40n);
  const table=new Uint8Array(8);
  if(r0>r1){table[0]=r0;table[7]=r1;for(let i=1;i<7;i++)table[i]=((7-i)*r0+i*r1)/7|0;}
  else{table[0]=r0;table[7]=r1;for(let i=1;i<5;i++)table[i]=((5-i)*r0+i*r1)/5|0;table[5]=0;table[6]=255;}
  const pixels=new Uint8Array(64);
  for(let i=0;i<16;i++){const ci=Number((idx>>(3*i))&7n);pixels[i*4]=table[ci];pixels[i*4+1]=table[ci];pixels[i*4+2]=table[ci];pixels[i*4+3]=255;}
  return pixels;
}

function decodeTextureBlock(data, off, format){
  switch(format){
    case 'BC3': return decodeBC3Block(data, off);
    case 'BC1': return decodeBC1Block(data, off);
    case 'BC4': return decodeBC4Block(data, off);
    case 'BC7': return null; // handled via bc7_decoder.js
    case 'RGBA8': return null; // raw RGBA, no block decoding needed
    default: return decodeBC3Block(data, off);
  }
}

function getTextureBlockSize(format){
  switch(format){
    case 'BC1': return 8;
    case 'BC4': return 8;
    case 'BC3': return 16;
    case 'BC7': return 16;
    case 'RGBA8': return 0; // raw pixels, not block-compressed
    default: return 16;
  }
}

function decodeTextureToCanvas(data, width, height, format){
  // Special handling for BC7
  if(format === 'BC7'){
    return decodeBC7Texture(data, width, height);
  }
  
  // Special handling for raw RGBA8
  if(format === 'RGBA8'){
    const canvas=document.createElement('canvas');
    canvas.width=width;canvas.height=height;
    const ctx=canvas.getContext('2d');
    const img=ctx.createImageData(width,height);
    const dst=img.data;
    // RGBA8 is stored as raw bytes, one block of width*height*4
    for(let i=0;i<width*height*4&&i<data.byteLength;i++){
      dst[i]=data[i];
    }
    ctx.putImageData(img,0,0);
    return canvas;
  }
  
  const blockSize = getTextureBlockSize(format);
  if(blockSize === 0) return null;
  
  const bx=Math.ceil(width/4), by=Math.ceil(height/4);
  const canvas=document.createElement('canvas');
  canvas.width=width;canvas.height=height;
  const ctx=canvas.getContext('2d');
  const img=ctx.createImageData(width,height);
  const dst=img.data;
  for(let iy=0;iy<by;iy++){
    for(let ix=0;ix<bx;ix++){
      const off=(iy*bx+ix)*blockSize;
      if(off+blockSize>data.byteLength)continue;
      const p=decodeTextureBlock(data,off,format);
      if(!p) continue;
      for(let py=0;py<4;py++){
        for(let px=0;px<4;px++){
          const x=ix*4+px,y=iy*4+py;
          if(x<width&&y<height){
            const si=(py*4+px)*4;
            const di=(y*width+x)*4;
            dst[di]=p[si];dst[di+1]=p[si+1];dst[di+2]=p[si+2];dst[di+3]=p[si+3];
          }
        }
      }
    }
  }
  ctx.putImageData(img,0,0);
  return canvas;
}

// ── Decode one buffer group ──
function decodeGroup(vbufB64, ibufB64, primitives){
  const vbuf=Uint8Array.from(atob(vbufB64),c=>c.charCodeAt(0));
  const ibuf=ibufB64?Uint8Array.from(atob(ibufB64),c=>c.charCodeAt(0)):null;
  const dv=new DataView(vbuf.buffer);
  const meshes=[];
  for(const prim of primitives){
    const [numStreams,vertCount,_p0,offsetA,strideA]=prim.vdata;
    const [ibRef,byteOffset,baseIndex,indexCount]=prim.idata;
    const ub=prim.unitBase,us=prim.unitScale;
    const indexWidth=prim.indexWidth||2;
    const positions=[];
    for(let i=0;i<vertCount;i++){
      const off=offsetA+i*strideA;
      if(off+6>vbuf.length)break;
      const x16=dv.getInt16(off,true),y16=dv.getInt16(off+2,true),z16=dv.getInt16(off+4,true);
      positions.push(ub[0]+(x16/32767.0)*us[0],ub[1]+(y16/32767.0)*us[1],ub[2]+(z16/32767.0)*us[2]);
    }
    const uvs=[];
    if(strideA>=12){
      for(let i=0;i<vertCount;i++){
        const off=offsetA+i*strideA+8;
        if(off+4>vbuf.length)break;
        uvs.push(f16(dv.getUint16(off,true)),f16(dv.getUint16(off+2,true)));
      }
    }
    const indices=[];
    if(ibuf&&indexCount>0){
      const idv=new DataView(ibuf.buffer,ibuf.byteOffset);
      if(indexWidth===2){for(let i=0;i<indexCount;i++){const off=byteOffset+i*2;if(off+2>ibuf.length)break;indices.push(idv.getUint16(off,true)-baseIndex);}}
      else if(indexWidth===4){for(let i=0;i<indexCount;i++){const off=byteOffset+i*4;if(off+4>ibuf.length)break;indices.push(idv.getUint32(off,true)-baseIndex);}}
      else if(indexWidth===1){for(let i=0;i<indexCount;i++){const off=byteOffset+i;if(off>=ibuf.length)break;indices.push(ibuf[off]-baseIndex);}}
    }
    if(positions.length<9||indices.length<3)continue;
    meshes.push({
      name:prim.material,
      displayName:prim.materialDisplayName||prim.material,
      materialRef:prim.materialRef,
      positions:new Float32Array(positions),
      uvs:new Float32Array(uvs),
      indices:indices.length>0&&Math.max(...indices)>65535?new Uint32Array(indices):new Uint16Array(indices),
    });
  }
  return meshes;
}

// ── Build Three.js model ──
function buildModel(allMeshes, textureMap, materials, matTexMap){
  if(modelGroup){
    scene.remove(modelGroup);
    modelGroup.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material){if(c.material.map)c.material.map.dispose();c.material.dispose();}});
  }
  modelGroup=new THREE.Group();
  let totalVerts=0,totalTris=0;

  const texList=Object.values(textureMap);
  // Prefer slot-0 (diffuse) textures, ordered by mtbIndex
  const diffuseTextures=texList.filter(t=>t.slot===0).sort((a,b)=>a.mtbIndex-b.mtbIndex);
  const allTexturesByIndex={};
  for(const t of texList) allTexturesByIndex[t.mtbIndex]=t;

  // Build material name -> best diffuse texture mapping
  const matNameToTex={};
  for(const m of materials||[]){
    const idx=m.index;
    // If MATP mapping exists, use it
    if(matTexMap && matTexMap[idx]!==undefined){
      const tIdx=matTexMap[idx];
      const t=allTexturesByIndex[tIdx];
      if(t && t.slot===0){
        const nameKey=(m.name||m.fileName||'').toLowerCase().replace(/[^a-z0-9]/g,'');
        matNameToTex[nameKey]=t.texture;
      }
    }
  }

  for(const m of allMeshes){
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(m.positions,3));
    if(m.uvs.length>0) geo.setAttribute('uv',new THREE.Float32BufferAttribute(m.uvs,2));
    geo.setIndex(new THREE.BufferAttribute(m.indices,1));
    geo.computeVertexNormals();

    let tex=null;
    if(texList.length>0){
      const mRef=m.materialRef;
      const matName=(m.displayName||m.name||'').toLowerCase();
      const matNameClean=matName.replace(/[^a-z0-9]/g,'');
      
      // 1. Try MATP mapping: materialRef -> texture_index
      if(matTexMap && matTexMap[mRef]!==undefined){
        const tIdx=matTexMap[mRef];
        const t=allTexturesByIndex[tIdx];
        if(t && t.slot===0) tex=t.texture;
      }
      
      // 2. Try matching material name -> texture from our pre-built map
      if(!tex && matNameToTex[matNameClean]){
        tex=matNameToTex[matNameClean];
      }
      
      // 3. Fallback: match diffuse textures by mtbIndex to materialRef or material name
      if(!tex){
        // Try matching material ref index to a diffuse texture
        const candidate=diffuseTextures[mRef];
        if(candidate) tex=candidate.texture;
      }
      
      // 4. Last resort: match by material name hash
      if(!tex){
        for(const t of texList){
          if(t.slot===0 && t.hash && matName.includes(t.hash.substring(0,6))){
            tex=t.texture;break;
          }
        }
      }
      
      // 5. If still no match, use the first available diffuse texture
      if(!tex && diffuseTextures.length>0){
        tex=diffuseTextures[0].texture;
      }
    }

    const matOpts={metalness:0.1,roughness:0.7,side:THREE.DoubleSide,flatShading:true};
    if(tex){matOpts.map=tex;matOpts.color=0xffffff;}else{matOpts.color=0x888888;}
    const mat=new THREE.MeshStandardMaterial(matOpts);

    const mesh=new THREE.Mesh(geo,mat);
    mesh.name=m.displayName||m.name||'primitive';
    modelGroup.add(mesh);
    totalVerts+=m.positions.length/3;
    totalTris+=m.indices.length/3;
  }

  const box=new THREE.Box3().setFromObject(modelGroup);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z,0.001);
  const scale=2.0/maxDim;
  modelGroup.scale.setScalar(scale);
  modelGroup.position.sub(center.clone().multiplyScalar(scale));
  scene.add(modelGroup);

  radius=maxDim*scale*2.5;
  targetY=0;theta=0;phi=Math.PI/4;
  updateCamera();
  const texCount=Object.keys(textureMap).length;
  document.getElementById('info').textContent=
    totalVerts+' verts \u00b7 '+totalTris+' tris \u00b7 '+allMeshes.length+' parts'+(texCount?' \u00b7 '+texCount+' textures':'');
}

function toggleWireframe(){isWireframe=!isWireframe;if(modelGroup)modelGroup.traverse(c=>{if(c.isMesh&&c.material)c.material.wireframe=isWireframe;});}
function toggleSpin(){isSpinning=!isSpinning;}
function resetCamera(){if(modelGroup)modelGroup.rotation.set(0,0,0);theta=0;phi=Math.PI/4;radius=5;targetX=targetY=targetZ=0;updateCamera();}

// ── Load character ──
async function loadCharacter(id,name){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector('[data-id="'+id+'"]');
  if(btn)btn.classList.add('active');
  document.getElementById('loading').textContent='Loading '+name+'...';
  document.getElementById('modelName').textContent=name;
  document.getElementById('info').textContent='';
  showViewer();
  try{
    const r=await fetch('/api/character?id='+encodeURIComponent(id));
    const d=await r.json();
    if(d.error){document.getElementById('loading').textContent='Error: '+d.error;return;}
    document.getElementById('loading').textContent='Decoding...';
    const textureMap={};
    for(const t of d.textures||[]){
      const raw=Uint8Array.from(atob(t.data),c=>c.charCodeAt(0));
      const canvas=decodeTextureToCanvas(raw,t.width,t.height,t.format);
      const tex=new THREE.CanvasTexture(canvas);
      tex.flipY=false;
      tex.wrapS=THREE.RepeatWrapping;
      tex.wrapT=THREE.RepeatWrapping;
      textureMap[t.hash]={texture:tex,width:t.width,height:t.height,size:t.size,format:t.format,slot:t.slot,mtbIndex:t.mtbIndex};
    }
    let allMeshes=[];
    for(const g of d.groups||[]){
      allMeshes=allMeshes.concat(decodeGroup(g.vbuf,g.ibuf,g.primitives));
    }
    buildModel(allMeshes,textureMap,d.materials||[],d.matTexMap||{});
    document.getElementById('loading').textContent='';
  }catch(e){document.getElementById('loading').textContent='Error: '+e.message;}
}

async function loadAsset(path,name){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('loading').textContent='Loading '+name+'...';
  document.getElementById('modelName').textContent=name;
  document.getElementById('info').textContent='';
  showViewer();
  try{
    const r=await fetch('/api/asset?path='+encodeURIComponent(path));
    const d=await r.json();
    if(d.error){document.getElementById('loading').textContent='Error: '+d.error;return;}
    document.getElementById('loading').textContent='Decoding...';
    const textureMap={};
    for(const t of d.textures||[]){
      const raw=Uint8Array.from(atob(t.data),c=>c.charCodeAt(0));
      const canvas=decodeTextureToCanvas(raw,t.width,t.height,t.format);
      const tex=new THREE.CanvasTexture(canvas);
      tex.flipY=false;
      tex.wrapS=THREE.RepeatWrapping;
      tex.wrapT=THREE.RepeatWrapping;
      textureMap[t.hash]={texture:tex,width:t.width,height:t.height,size:t.size,format:t.format,slot:t.slot,mtbIndex:t.mtbIndex};
    }
    let allMeshes=[];
    for(const g of d.groups||[]){
      allMeshes=allMeshes.concat(decodeGroup(g.vbuf,g.ibuf,g.primitives));
    }
    buildModel(allMeshes,textureMap,d.materials||[],d.matTexMap||{});
    document.getElementById('loading').textContent='';
  }catch(e){document.getElementById('loading').textContent='Error: '+e.message;}
}

// ── Init ──
(async function(){
  initViewport();
  try{
    const [charRes, assetRes] = await Promise.all([
      fetch('/api/characters'),
      fetch('/api/assets')
    ]);
    const charData = await charRes.json();
    const assetData = await assetRes.json();

    let html = '';

    // Characters section
    html += '<div class="model-section"><h2 onclick="this.parentElement.classList.toggle(\'collapsed\')" style="cursor:pointer">Characters ('+charData.characters.length+')</h2><div class="model-section-items">';
    for(const c of charData.characters){
      html+='<button class="btn" data-id="'+c.id+'" onclick="loadCharacter(\''+c.id+'\',\''+esc(c.name)+'\')">'+c.name+'</button>';
    }
    html += '</div></div>';

    // Asset categories (environment, choreographies, etc.)
    const cats = assetData.categories||{};
    const catOrder = ['Environment','Choreographies','Exploders','Worlds','Objects','Realms','Weapons','Basic Shapes'];
    const allCats = [...catOrder, ...Object.keys(cats).filter(c=>!catOrder.includes(c))];
    for(const catName of allCats){
      const items = cats[catName];
      if(!items || !items.length) continue;
      html += '<div class="model-section"><h2 onclick="this.parentElement.classList.toggle(\'collapsed\')" style="cursor:pointer">'+catName+' ('+items.length+')</h2><div class="model-section-items">';
      for(const item of items){
        const shortPath = item.path.replace(/\.zip$/,'');
        const label = item.name.replace(/_/g,' ');
        html+='<button class="btn" onclick="loadAsset(\''+esc(shortPath)+'\',\''+esc(label)+'\')">'+label+'</button>';
      }
      html += '</div></div>';
    }

    document.getElementById('model-sections').innerHTML = html || '<div style="padding:16px;color:#556">Nothing found</div>';
  }catch(e){
    document.getElementById('model-sections').innerHTML='<div style="padding:16px;color:#cc4444">'+e.message+'</div>';
  }
})();
</script>
